<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Portal Orang Tua - Sistem Presensi</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        /* IMPLEMENTASI WARNA BAKU SLATE BLUE & EMERALD TECH */
        body {
            background-color: #1e293b; /* Latar Belakang Slate Dark penuh untuk fokus login */
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .login-card {
            background: #ffffff;
            border: none;
            border-radius: 24px; /* Sudut Melengkung Halus & Lebar */
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
            width: 100%;
            max-width: 420px;
            padding: 40px 35px;
            transition: transform 0.3s ease;
        }
        
        .icon-header {
            width: 75px;
            height: 75px;
            background-color: rgba(15, 118, 110, 0.1); /* Emerald transparan */
            color: #0f766e; /* Emerald Tech */
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 auto 20px;
        }
        
        /* STYLING FORM INPUT TERPADU */
        .form-label {
            font-size: 12px;
            font-weight: 700;
            color: #64748b;
            letter-spacing: 0.5px;
        }
        
        .input-group-text {
            background-color: #f8fafc;
            border: 1px solid #cbd5e1;
            border-right: none;
            color: #94a3b8;
            border-top-left-radius: 10px;
            border-bottom-left-radius: 10px;
        }
        
        .form-control {
            border: 1px solid #cbd5e1;
            border-top-right-radius: 10px;
            border-bottom-right-radius: 10px;
            padding: 11px 14px;
            font-size: 14px;
            color: #334155;
        }
        
        .form-control:focus {
            border-color: #0f766e;
            box-shadow: none;
        }
        
        .input-group:focus-within .input-group-text {
            border-color: #0f766e;
            color: #0f766e;
        }
        
        /* TOMBOL UTAMA EMERALD TECH */
        .btn-login {
            background-color: #0f766e;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            font-size: 15px;
            letter-spacing: 0.5px;
            transition: background-color 0.2s ease;
        }
        
        .btn-login:hover {
            background-color: #115e59;
            color: #ffffff;
        }
        
        .alert-danger {
            background-color: #fef2f2;
            border: 1px solid #fee2e2;
            color: #991b1b;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="login-card animate__animated animate__fadeIn">
        <div class="icon-header">
            <i class="bi bi-person-video3"></i>
        </div>
        
        <h4 class="text-center fw-bold text-dark mb-1">Portal Wali Murid</h4>
        <p class="text-center text-muted small mb-4">Sistem Pemantauan Absensi Kamera & Perizinan SMK</p>
        
        {% if error %}
        <div class="alert alert-danger p-3 mb-4 d-flex align-items-center gap-2">
            <i class="bi bi-exclamation-triangle-fill fs-5"></i>
            <div>{{ error }}</div>
        </div>
        {% endif %}
        
        <form action="/orangtua/login" method="POST">
            <div class="mb-3">
                <label class="form-label text-uppercase">Username (ID / NISN Siswa)</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                    <input type="number" name="student_id" class="form-control" placeholder="Contoh: 101" required>
                </div>
            </div>
            
            <div class="mb-4">
                <label class="form-label text-uppercase">Password (No. HP Wali Murid)</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                    <input type="password" name="parent_phone" class="form-control" placeholder="Contoh: 0812345xxxxx" required>
                </div>
            </div>
            
            <button type="submit" class="btn btn-login w-100 text-uppercase shadow-sm">
                Masuk Ke Portal <i class="bi bi-arrow-right-short ms-1"></i>
            </button>
        </form>
    </div>

</body>
</html>
