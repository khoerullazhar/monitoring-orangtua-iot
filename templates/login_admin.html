<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Panel Admin - Sistem Presensi</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        body {
            background-color: #0f172a; /* Warna Slate super dark khusus area admin */
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .login-card {
            background: #ffffff;
            border: none;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 420px;
            padding: 40px 35px;
        }
        
        .icon-header {
            width: 75px;
            height: 75px;
            background-color: rgba(2, 132, 199, 0.1); /* Sky Blue Tech */
            color: #0284c7;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 auto 20px;
        }
        
        .form-label { font-size: 11px; font-weight: 700; color: #64748b; letter-spacing: 0.5px; }
        .input-group-text { background-color: #f8fafc; border: 1px solid #cbd5e1; border-right: none; color: #94a3b8; border-top-left-radius: 10px; border-bottom-left-radius: 10px; }
        .form-control { border: 1px solid #cbd5e1; border-top-right-radius: 10px; border-bottom-right-radius: 10px; padding: 11px 14px; font-size: 14px; }
        .form-control:focus { border-color: #0284c7; box-shadow: none; }
        .input-group:focus-within .input-group-text { border-color: #0284c7; color: #0284c7; }
        
        .btn-admin {
            background-color: #1e293b;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.2s;
        }
        .btn-admin:hover { background-color: #0f172a; color: #ffffff; }
        .alert-danger { border-radius: 10px; font-size: 13px; font-weight: 500; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="icon-header">
            <i class="bi bi-shield-lock-fill"></i>
        </div>
        
        <h4 class="text-center fw-bold text-dark mb-1">Otorisasi Admin</h4>
        <p class="text-center text-muted small mb-4">Sistem Manajemen Presensi IoT & Big Data</p>
        
        {% if error %}
        <div class="alert alert-danger p-3 mb-4 d-flex align-items-center gap-2">
            <i class="bi bi-exclamation-triangle-fill fs-5"></i>
            <div>{{ error }}</div>
        </div>
        {% endif %}
        
        <form action="/admin/login" method="POST">
            <div class="mb-3">
                <label class="form-label text-uppercase">Username Pengendali</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                    <input type="text" name="username" class="form-control" placeholder="Masukkan ID Admin" required>
                </div>
            </div>
            
            <div class="mb-4">
                <label class="form-label text-uppercase">Kunci Sandi (Password)</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-key-fill"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
            </div>
            
            <button type="submit" class="btn btn-admin w-100 text-uppercase shadow-sm">
                Masuk Sistem <i class="bi bi-unlock-fill ms-1"></i>
            </button>
        </form>
    </div>

</body>
</html>
